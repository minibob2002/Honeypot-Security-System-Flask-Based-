<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Honeypot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      min-height: 100vh;
      scroll-behavior: smooth;
      position: relative;
      padding-top: 70px; /* space for fixed navbar */
    }

    /* Particle background */
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* Navbar */
    .navbar {
      background: #212529;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .navbar-nav .nav-link {
      margin-left: 1rem;
      font-weight: 500;
      transition: color 0.3s, transform 0.3s;
    }
    .navbar-nav .nav-link:hover {
      color: #ff4b2b;
      transform: translateY(-2px);
    }
    .navbar-brand {
      font-size: 1.5rem;
      color: #ff4b2b;
      transition: color 0.3s;
    }
    .navbar-brand:hover {
      color: #ff416c;
    }

    /* Card */
    .login-card {
      background: rgba(30, 30, 30, 0.95);
      padding: 2.5rem 2rem;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 400px;
      transition: transform 0.3s;
      margin: auto;
    }
    .login-card:hover {
      transform: translateY(-5px);
    }

    .login-card h3 {
      margin-bottom: 1.5rem;
      text-align: center;
      color: #ff4b2b;
    }

    .form-control {
      background: #212529;
      border: 1px solid #444;
      color: #fff;
    }
    .form-control:focus {
      background: #212529;
      border-color: #ff4b2b;
      color: #fff;
      box-shadow: none;
    }

    .btn-primary {
      background: #ff4b2b;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 50px;
      font-weight: 500;
      transition: 0.3s;
    }
    .btn-primary:hover {
      background: #ff416c;
    }

    .text-warning {
      color: #ffcb6b !important;
    }

    .alert {
      margin-top: 1rem;
    }

    /* Center container */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 70px);
    }
  </style>
</head>
<body>

  <!-- Particle Background -->
  <div id="particles-js"></div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">Honeypot</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('index') }}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="{{ url_for('login') }}">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('register') }}">Register</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-danger fw-bold" href="{{ url_for('admin') }}">Admin</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Login Card -->
  <div class="login-container">
    <div class="login-card">
      <h3>Login</h3>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button class="btn btn-primary w-100">Login</button>
      </form>
      <p class="mt-3 text-center">Don’t have an account? <a href="{{ url_for('register') }}" class="text-warning">Register</a></p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="mt-3">
            {% for category, msg in messages %}
              <div class="alert alert-{{category}}">{{ msg }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    particlesJS("particles-js", {
      "particles": {
        "number": {"value": 80},
        "color": {"value": "#ffffff"},
        "shape": {"type": "circle"},
        "opacity": {"value": 0.3},
        "size": {"value": 3},
        "line_linked": {"enable": true, "distance": 120, "color": "#ffffff", "opacity": 0.2, "width": 1},
        "move": {"enable": true, "speed": 2}
      }
    });
  </script>
</body>
</html>
