      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);

      max-width: 500px;

    .register-card:hover {

      text-align: center;
      color: #ff4b2b;
    }

    }
    .form-control:focus {
      background: #212529;
      border-color: #ff4b2b;
      color: #fff;
      box-shadow: none;
    }
    
    .input-group .form-control:first-child {

      border-bottom-right-radius: 0;
    }
    
    .input-group .form-control:last-child {

    .input-group select.form-control {

      }
    });
    
    // Phone number formatting and validation
    document.addEventListener('DOMContentLoaded', function() {
      const phoneInput = document.querySelector('input[name="phone"]');
      const countrySelect = document.querySelector('select[name="country_code"]');
      
      // Format phone number as user types
      phoneInput.addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, ''); // Remove non-digits
        
        // Basic formatting based on country code
        const countryCode = countrySelect.value;
        if (countryCode === '+1') {
          // US/Canada format: (XXX) XXX-XXXX
          if (value.length >= 6) {
            value = value.replace(/(\d{3})(\d{3})(\d{4})/, '($1) $2-$3');
          } else if (value.length >= 3) {
            value = value.replace(/(\d{3})(\d{0,3})/, '($1) $2');
          }
        } else if (countryCode === '+44') {
          // UK format: XXXX XXX XXXX
          if (value.length >= 7) {
            value = value.replace(/(\d{4})(\d{3})(\d{3})/, '$1 $2 $3');
          } else if (value.length >= 4) {
            value = value.replace(/(\d{4})(\d{0,3})/, '$1 $2');
          }
        } else if (countryCode === '+91') {
          // India format: XXXX XXX XXXX
          if (value.length >= 7) {
            value = value.replace(/(\d{4})(\d{3})(\d{3})/, '$1 $2 $3');
          } else if (value.length >= 4) {
            value = value.replace(/(\d{4})(\d{0,3})/, '$1 $2');
          }
        }
        
        e.target.value = value;
      });
      
      // Update placeholder based on country code
      countrySelect.addEventListener('change', function() {
        const countryCode = this.value;
        const placeholders = {
          '+1': 'Enter phone number (e.g., 1234567890)',

          '+39': 'Enter phone number (e.g., 3123456789)',

          '+7': 'Enter phone number (e.g., 9123456789)',
          '+55': 'Enter phone number (e.g., 11987654321)',
          '+61': 'Enter phone number (e.g., 412345678)',
          '+82': 'Enter phone number (e.g., 1012345678)',
          '+65': 'Enter phone number (e.g., 81234567)',
