<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honeypot Hive</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      min-height: 100vh;
      position: relative;
      padding-top: 70px;
    }

    /* Particle background */
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* Navbar */
    .navbar {
      background: #212529;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
    }
    .navbar-nav .nav-link {
      margin-left: 1rem;
      font-weight: 500;
      transition: color 0.3s, transform 0.3s;
    }
    .navbar-nav .nav-link:hover {
      color: #ff4b2b;
      transform: translateY(-2px);
    }
    .navbar-brand {
      font-size: 1.5rem;
      color: #ff4b2b;
      transition: color 0.3s;
    }
    .navbar-brand:hover { color: #ff416c; }

    /* Page title */
    .page-title {
      margin-bottom: 2rem;
      text-align: center;
      color: #ff4b2b;
    }

    /* Table */
    .table-wrapper {
      background: rgba(30,30,30,0.85);
      border-radius: 15px;
      padding: 1.5rem;
      overflow-x: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    table {
      color: #fff;
    }
    thead th {
      color: #ffc107;
      border-bottom: 2px solid #ff4b2b;
    }
    tbody tr:hover {
      background: rgba(255, 75, 43, 0.1);
    }
    .btn-back {
      margin-bottom: 1rem;
      border-radius: 50px;
      font-weight: 500;
      transition: 0.3s;
    }
    .btn-back:hover { background: #ff4b2b; color: #fff; }
  </style>
</head>
<body>

  <!-- Particle Background -->
  <div id="particles-js"></div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('admin') }}">Admin Dashboard</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link active text-warning fw-bold" href="{{ url_for('hive') }}">Hive (Attack Logs)</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('hack') }}">Hack Simulation</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('analyze') }}">Analyze Logs</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('admin') }}">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-danger fw-bold" href="{{ url_for('logout') }}">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <div class="container mt-5">
    <h2 class="page-title">Honeypot Hive</h2>
    <a href="{{ url_for('admin') }}" class="btn btn-outline-warning btn-back">Back to Admin Panel</a>

    <div class="table-wrapper">
      <table class="table table-hover table-borderless">
        <thead>
          <tr>
            <th>ID</th>
            <th>Attack Type</th>
            <th>Username</th>
            <th>Details (IP)</th>
            <th>Timestamp</th>
          </tr>
        </thead>
        <tbody>
          {% for log in logs %}
          <tr>
            <td>{{ log[0] }}</td>
            <td>{{ log[1] }}</td>
            <td>{{ log[3] }}</td>
            <td>{{ log[2] }}</td>
            <td>{{ log[4] }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    particlesJS("particles-js", {
      "particles": {
        "number": {"value": 80},
        "color": {"value": "#ffffff"},
        "shape": {"type": "circle"},
        "opacity": {"value": 0.3},
        "size": {"value": 3},
        "line_linked": {"enable": true, "distance": 120, "color": "#ffffff", "opacity": 0.2, "width": 1},
        "move": {"enable": true, "speed": 2}
      }
    });
  </script>
</body>
</html>
