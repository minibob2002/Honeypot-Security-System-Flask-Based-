<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Honeypot Project{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f6f9;
    }
    .navbar {
      background: #212529;
    }
    .card {
      border-radius: 15px;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark navbar-expand-lg mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">Honeypot</a>
      <div>
        <a href="{{ url_for('login') }}" class="btn btn-outline-light btn-sm">Login</a>
        <a href="{{ url_for('register') }}" class="btn btn-outline-success btn-sm">Register</a>
        <a href="{{ url_for('admin') }}" class="btn btn-outline-danger btn-sm">Admin</a>
      </div>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

</body>
</html>
