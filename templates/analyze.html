<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attack Log Analysis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      min-height: 100vh;
      position: relative;
      padding-top: 70px;
    }
    .navbar {
      background: #212529;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
    }
    .navbar-brand {
      font-size: 1.5rem;
      color: #ff4b2b;
      transition: color 0.3s;
    }
    .navbar-brand:hover { color: #ff416c; }
    .page-title {
      margin-bottom: 2rem;
      text-align: center;
      color: #ff4b2b;
    }
    .analysis-box {
      background: rgba(30,30,30,0.85);
      border-radius: 15px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .chart-box {
      background: rgba(30,30,30,0.85);
      border-radius: 15px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .btn-back {
      margin-bottom: 1rem;
      border-radius: 50px;
      font-weight: 500;
      transition: 0.3s;
    }
    .btn-back:hover { background: #ff4b2b; color: #fff; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('admin') }}">Admin Dashboard</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('hive') }}">Hive (Attack Logs)</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('analyze') }}">Analyze Logs</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('admin') }}">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-danger fw-bold" href="{{ url_for('logout') }}">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container mt-5">
    <h2 class="page-title">Attack Log Analysis & Visualization</h2>
    <a href="{{ url_for('admin') }}" class="btn btn-outline-warning btn-back">Back to Admin Panel</a>
    <div class="analysis-box">
      <h4>AI Analysis</h4>
      <div id="ai-analysis" class="ai-analysis-text" style="white-space: pre-wrap; color: #ffc107; font-family: 'Roboto Mono', monospace; font-size: 1.1rem;"></div>
    </div>
    <div class="chart-box">
      <h4>Attack Type Frequency</h4>
      <canvas id="attackChart" height="100"></canvas>
    </div>
    <div class="chart-box">
      <h4>Attack Type Distribution</h4>
      <div style="display: flex; justify-content: center; max-width: 400px; margin: 0 auto;">
        <canvas id="attackPie" width="300" height="300"></canvas>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    const attackCounts = {{ attack_counts|tojson }};
    // Bar Chart
    const ctx = document.getElementById('attackChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: Object.keys(attackCounts),
        datasets: [{
          label: 'Number of Attacks',
          data: Object.values(attackCounts),
          backgroundColor: '#ff4b2b',
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          title: { display: false }
        },
        scales: {
          x: { ticks: { color: '#fff' } },
          y: { ticks: { color: '#fff' }, beginAtZero: true }
        }
      }
    });
    // Pie Chart
    const pieCtx = document.getElementById('attackPie').getContext('2d');
    new Chart(pieCtx, {
      type: 'pie',
      data: {
        labels: Object.keys(attackCounts),
        datasets: [{
          data: Object.values(attackCounts),
          backgroundColor: [
            '#ff4b2b', '#ffb347', '#36a2eb', '#4bc0c0', '#9966ff', '#f67280', '#43cea2', '#f7b42c', '#374785', '#a8e063'
          ],
          borderWidth: 2,
          borderColor: '#222'
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            display: true,
            labels: { color: '#fff', font: { weight: 'bold' } }
          },
          title: { display: false }
        }
      }
    });

    // Render AI analysis as HTML with bullet points and bold headings
    const analysisRaw = {{ analysis|tojson }};
    function renderAnalysisMarkdown(text) {
      // Remove all asterisks
      text = text.replace(/\*/g, '');
      // Convert markdown headings to bold and larger font (section titles)
      text = text.replace(/^## (.*)$/gm, '<h5 style="font-weight:bold;font-size:1.25em;margin-top:1.2em;margin-bottom:0.5em;">$1</h5>');
      // Convert section subtitles (e.g., Summary of Findings:)
      text = text.replace(/^([A-Z][A-Za-z0-9 ]+):$/gm, '<span style="font-weight:bold;font-size:1.1em;">$1:</span>');
      // Convert numbered lists
      text = text.replace(/\n(\d+)\. ([^:]+):(.*)/g, '<li><span style="font-weight:bold;">$2:</span>$3</li>');
      // Convert unordered lists
      text = text.replace(/\n- (.*)/g, '<li>$1</li>');
      // Convert double newlines to paragraph breaks
      text = text.replace(/\n\n/g, '</ul><ul>');
      // Start and end with <ul>
      text = '<ul>' + text + '</ul>';
      // Remove empty <ul></ul>
      text = text.replace(/<ul>\s*<\/ul>/g, '');
      // Remove <ul> before <h5> and after </h5> for cleaner structure
      text = text.replace(/<ul>\s*(<h5[^>]*>)/g, '$1<ul>');
      text = text.replace(/(<\/h5>)\s*<ul>/g, '$1<ul>');
      return text;
    }
    document.getElementById('ai-analysis').innerHTML = renderAnalysisMarkdown(analysisRaw);
  </script>
</body>
</html>
